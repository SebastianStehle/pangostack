# Referenced by configs/postgres-docker.yml via dockerComposeUrl.
# The POSTGRES_* variables are injected by the docker-compose-ssh resource from the deployment
# parameters, so they never appear in this file.
services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
