# Referenced by configs/redis-docker.yml via dockerComposeUrl.
# The REDIS_* variables are injected by the docker-compose-ssh resource from the deployment
# parameters, so they never appear in this file.
services:
  redis:
    image: redis:${REDIS_VERSION:-7}
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-noeviction}
      - --appendonly
      - 'yes'
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
